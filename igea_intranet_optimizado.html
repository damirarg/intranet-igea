<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IGEA - Intranet App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        
        body {
            position: relative;
            background-color: #f8fafc;
            display: flex;
            flex-direction: row;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        aside, main { position: relative; z-index: 1; }

        .app-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.18), transparent 28%),
                radial-gradient(circle at 80% 16%, rgba(16, 185, 129, 0.16), transparent 24%),
                linear-gradient(135deg, #f7fbff 0%, #eef8ff 45%, #f8fff9 100%);
        }

        .app-background::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(14, 116, 144, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 116, 144, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
            animation: driftGrid 18s linear infinite;
        }

        .bg-orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(28px);
            opacity: 0.7;
            animation: floatBlob 14s ease-in-out infinite alternate;
        }

        .orb-a {
            width: 24rem;
            height: 24rem;
            background: rgba(96, 165, 250, 0.22);
            top: -5rem;
            left: -4rem;
        }

        .orb-b {
            width: 20rem;
            height: 20rem;
            background: rgba(34, 197, 94, 0.18);
            bottom: -2rem;
            right: -3rem;
            animation-duration: 17s;
        }

        .orb-c {
            width: 15rem;
            height: 15rem;
            background: rgba(251, 191, 36, 0.16);
            top: 36%;
            right: 10%;
            animation-duration: 12s;
        }

        #cursor-trail { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }

        .cursor-glow {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 9999px;
            border: 1px solid rgba(59, 130, 246, 0.22);
            background: radial-gradient(circle, rgba(96, 165, 250, 0.22) 0%, rgba(96, 165, 250, 0.06) 45%, transparent 70%);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 18px rgba(96, 165, 250, 0.12);
            mix-blend-mode: screen;
        }

        @keyframes floatBlob {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(20px, -30px, 0) scale(1.08); }
        }

        @keyframes driftGrid {
            from { transform: translateY(0); }
            to { transform: translateY(24px); }
        }

        @keyframes pulseStroke {
            0%, 100% { stroke-dasharray: 0 1000; opacity: 0.35; }
            50% { stroke-dasharray: 180 120; opacity: 0.7; }
        }

        @keyframes rotateDNA {
            from { transform: rotateZ(0deg); }
            to { transform: rotateZ(360deg); }
        }

        @keyframes softGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(96, 165, 250, 0.1); }
            50% { box-shadow: 0 0 30px rgba(96, 165, 250, 0.2); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .inicio-background::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.65);
            -webkit-backdrop-filter: blur(3px);
            backdrop-filter: blur(3px);
        }

        .dna-animation {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.3), rgba(16, 185, 129, 0.3));
            animation: rotateDNA 8s linear infinite;
            flex-shrink: 0;
        }

        aside {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 16rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .logo-container img {
            max-height: 60px;
            width: auto;
            object-fit: contain;
            filter: brightness(1.1);
        }

        .content-card {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.9) 100%);
            border: 1px solid rgba(200, 220, 255, 0.3);
            animation: softGlow 3s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #contenido-seccion {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem;
        }

        input, select, textarea { font-size: 16px; }

        /* MEDIA QUERIES */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            aside {
                width: 100%;
                flex-direction: row;
                padding: 12px;
                gap: 8px;
                align-items: center;
                min-height: auto;
                max-height: 80px;
            }

            .logo-container {
                margin-bottom: 0;
                flex-shrink: 0;
            }

            .logo-container img {
                max-height: 45px;
            }

            .sidebar-header {
                display: flex;
                align-items: center;
                gap: 8px;
                flex-shrink: 0;
            }

            .sidebar-header h1 {
                font-size: 1rem;
                margin: 0;
                white-space: nowrap;
            }

            .sidebar-header p {
                display: none;
            }

            #menu-navegacion {
                display: flex;
                flex-direction: row;
                gap: 6px;
                padding: 0;
                flex: 1;
            }

            #menu-navegacion button {
                padding: 8px 12px;
                font-size: 0.8rem;
                flex: 1;
                white-space: nowrap;
            }

            .sidebar-footer {
                display: none;
            }

            .dna-animation {
                display: none;
            }

            main {
                width: 100%;
                height: auto;
                overflow-y: auto;
            }

            #contenido-seccion {
                padding: 16px;
                max-width: none;
            }

            .inicio-background {
                padding: 12px;
            }

            header {
                flex-direction: column;
                gap: 8px;
                padding: 12px;
            }

            #titulo-seccion {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            aside {
                max-height: 90px;
                gap: 4px;
                padding: 8px;
            }

            .sidebar-header h1 {
                font-size: 0.9rem;
            }

            .logo-container img {
                max-height: 40px;
            }

            #menu-navegacion button {
                padding: 6px 8px;
                font-size: 0.7rem;
            }

            #contenido-seccion {
                padding: 12px;
            }

            #titulo-seccion {
                font-size: 1rem;
            }

            header {
                padding: 8px;
                gap: 6px;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="app-background" aria-hidden="true">
        <div class="bg-orb orb-a"></div>
        <div class="bg-orb orb-b"></div>
        <div class="bg-orb orb-c"></div>
    </div>
    <div id="cursor-trail" aria-hidden="true"></div>

    <!-- SIDEBAR -->
    <aside class="bg-blue-900/95 text-white shadow-xl border-r border-white/10" style="-webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);">

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col">
        <header class="bg-white/80 backdrop-blur border-b px-4 py-3 sticky top-0 z-40">
            <h2 id="titulo-seccion" class="text-2xl font-bold text-blue-900">Inicio</h2>
        </header>

        <div id="contenido-seccion" class="flex-1 overflow-y-auto p-4">
            <!-- Contenido dinámico -->
        </div>
    </main>

    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

        // Datos
        const archivosDrive = {
            dpp: [
                { titulo: "Coordinador Operativo, Administrativo y de Finanzas", url: "https://docs.google.com/document/d/e/2PACX-1vQfMGqJT4lLrHl7tJ8j-zQ1VPpDT0RvSZPhGvflWj-V7bLO_KBGDr4WKq9DwV-KJCGa0FVVHUpHvEgv/pub?embedded=true" },
                { titulo: "Administrativa de Admisión y Atención al Público", url: "https://docs.google.com/document/d/e/2PACX-1vSdJNfnJhkFrRyLPXAUQv1dNZPP91GhXw1fFhBbGUV5Q3KdUvL0bF6KLxcqOgKILfC3Wh2VQkD5tHH8/pub?embedded=true" },
                { titulo: "Operadora de Atención Digital", url: "https://docs.google.com/document/d/e/2PACX-1vTyM5d_7KQyYP5c_1Jy5WvO7mRn0bqNH7zK8ZqQqJP5CvN8vL2N5xK9Q/pub?embedded=true" },
                { titulo: "Administrativa de Enlace Institucional", url: "https://docs.google.com/document/d/e/2PACX-1vYqRzK1N8R3S4V2_7W9X0YZ1A2B3C4D5E6F7G/pub?embedded=true" },
                { titulo: "Responsable de Tesorería y Pagos", url: "https://docs.google.com/document/d/e/2PACX-1vA1B2C3D4E5F6G7H8I9J0K1L2M3N4O5P6Q7R/pub?embedded=true" }
            ],
            procedimientos: [
                { titulo: "Gestión de Vacaciones y Licencias Especiales", url: "https://docs.google.com/document/d/e/2PACX-1vQqJmN5K6L7M8N9O0P1Q2R3S4T5U6V7W8X/pub?embedded=true" }
            ]
        };

        // Cursor trail (solo desktop)
        if (!isMobile) {
            const trailContainer = document.getElementById('cursor-trail');
            document.addEventListener('mousemove', (e) => {
                const glow = document.createElement('div');
                glow.className = 'cursor-glow';
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
                trailContainer.appendChild(glow);
                setTimeout(() => glow.remove(), 600);
            });
        }

        function cambiarVista(vista) {
            const contenido = document.getElementById('contenido-seccion');
            const titulo = document.getElementById('titulo-seccion');

            document.querySelectorAll('#menu-navegacion button').forEach(btn => {
                btn.classList.remove('bg-blue-800');
                btn.classList.add('hover:bg-blue-800');
            });

            if (vista === 'inicio') {
                titulo.textContent = 'Inicio';
                event.target.classList.add('bg-blue-800');
                contenido.innerHTML = `
                    <div class="inicio-background rounded-lg p-6 md:p-8">
                        <div class="relative z-10">
                            <h1 class="text-3xl md:text-4xl font-bold text-blue-900 mb-4">Bienvenido a IGEA</h1>
                            <p class="text-lg md:text-xl text-gray-700 mb-6">Portal de gestión interna de la institución</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="content-card p-4 rounded-lg">
                                    <h3 class="font-bold text-blue-900 mb-2">📊 DPP</h3>
                                    <p class="text-sm text-gray-600">Descripciones de Perfil y Puestos</p>
                                </div>
                                <div class="content-card p-4 rounded-lg">
                                    <h3 class="font-bold text-blue-900 mb-2">📋 Procedimientos</h3>
                                    <p class="text-sm text-gray-600">Gestión de procesos organizacionales</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (vista === 'dpp') {
                titulo.textContent = 'Descripciones de Perfil y Puestos';
                event.target.classList.add('bg-blue-800');
                contenido.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${archivosDrive.dpp.map((doc, i) => `
                    <div class="content-card p-4 rounded-lg cursor-pointer" onclick="abrirDocumento('${doc.titulo}', '${doc.url}')">
                        <h3 class="font-bold text-blue-900 mb-2">📄 ${doc.titulo}</h3>
                    </div>
                `).join('')}</div>`;
            } else if (vista === 'procedimientos') {
                titulo.textContent = 'Procedimientos';
                event.target.classList.add('bg-blue-800');
                contenido.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${archivosDrive.procedimientos.map((doc, i) => `
                    <div class="content-card p-4 rounded-lg cursor-pointer" onclick="abrirDocumento('${doc.titulo}', '${doc.url}')">
                        <h3 class="font-bold text-blue-900 mb-2">📋 ${doc.titulo}</h3>
                    </div>
                `).join('')}</div>`;
            }
        }

        function abrirDocumento(titulo, url) {
            const contenido = document.getElementById('contenido-seccion');
            contenido.innerHTML = `
                <div class="h-full flex flex-col bg-white rounded-lg overflow-hidden shadow-lg">
                    <div class="bg-blue-900 text-white p-4 flex items-center justify-between sticky top-0 z-50">
                        <h3 class="font-bold text-lg truncate">${titulo}</h3>
                        <button onclick="cambiarVista('${titulo.includes('Vacacion') ? 'procedimientos' : 'dpp'}')" class="px-3 py-1 bg-blue-700 rounded hover:bg-blue-600 text-sm">← Atrás</button>
                    </div>
                    <iframe src="${url}" class="flex-1 w-full border-none" title="${titulo}"></iframe>
                </div>
            `;
        }

        // Mostrar inicio al cargar
        cambiarVista('inicio');
    </script>
</body>
