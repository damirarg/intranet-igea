<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IGEA - Intranet App</title>
    <!-- Importamos Tailwind CSS para un diseño moderno y rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            position: relative;
            background-color: #f8fafc;
            display: flex;
            flex-direction: row;
            height: 100vh;
            height: 100dvh;
        }

        aside, main {
            position: relative;
            z-index: 1;
        }

        .app-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.18), transparent 28%),
                radial-gradient(circle at 80% 16%, rgba(16, 185, 129, 0.16), transparent 24%),
                linear-gradient(135deg, #f7fbff 0%, #eef8ff 45%, #f8fff9 100%);
        }

        .app-background::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(14, 116, 144, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 116, 144, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
            animation: driftGrid 18s linear infinite;
        }

        .bg-orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(28px);
            opacity: 0.7;
            animation: floatBlob 14s ease-in-out infinite alternate;
        }

        .orb-a {
            width: 24rem;
            height: 24rem;
            background: rgba(96, 165, 250, 0.22);
            top: -5rem;
            left: -4rem;
        }

        .orb-b {
            width: 20rem;
            height: 20rem;
            background: rgba(34, 197, 94, 0.18);
            bottom: -2rem;
            right: -3rem;
            animation-duration: 17s;
        }

        .orb-c {
            width: 15rem;
            height: 15rem;
            background: rgba(251, 191, 36, 0.16);
            top: 36%;
            right: 10%;
            animation-duration: 12s;
        }

        .bg-wave {
            position: absolute;
            inset: -10%;
            width: 120%;
            height: 120%;
            opacity: 0.75;
        }

        .bg-path {
            fill: none;
            stroke: rgba(14, 116, 144, 0.2);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: pulseStroke 8s ease-in-out infinite;
        }

        .path-b {
            animation-delay: -3s;
        }

        #cursor-trail {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }

        .cursor-glow {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 9999px;
            border: 1px solid rgba(59, 130, 246, 0.22);
            background: radial-gradient(circle, rgba(96, 165, 250, 0.22) 0%, rgba(96, 165, 250, 0.06) 45%, transparent 70%);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 18px rgba(96, 165, 250, 0.12);
            transition: transform 120ms ease-out, width 120ms ease-out, height 120ms ease-out;
            mix-blend-mode: screen;
        }

        @keyframes floatBlob {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }
            to {
                transform: translate3d(20px, -30px, 0) scale(1.08);
            }
        }

        @keyframes driftGrid {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(24px);
            }
        }

        @keyframes pulseStroke {
            0%, 100% {
                stroke-dasharray: 0 1000;
                opacity: 0.35;
            }
            50% {
                stroke-dasharray: 180 120;
                opacity: 0.7;
            }
        }

        /* Utilidad para ocultar la barra de scroll pero mantener funcionalidad */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .inicio-background {
            position: relative;
            background-image: url('./assets/consultorio.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .inicio-background::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.65);
            -webkit-backdrop-filter: blur(3px);
            backdrop-filter: blur(3px);
            z-index: 1;
        }

        .inicio-background > * {
            position: relative;
            z-index: 2;
        }

        /* Estilos para la barra lateral con ADN */
        aside {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-dna-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0.18;
            z-index: 0;
            object-fit: cover;
            object-position: center;
        }

        .sidebar-header {
            position: relative;
            z-index: 10;
        }

        nav {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .sidebar-footer {
            position: relative;
            z-index: 10;
        }

        @keyframes rotateDNA {
            from {
                transform: translateY(-100%) rotateZ(0deg);
            }
            to {
                transform: translateY(100%) rotateZ(-360deg);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .logo-container img {
            max-height: 60px;
            width: auto;
            object-fit: contain;
            filter: brightness(1.1);
        }

        /* Animaciones mejoradas para DPP y Procedimientos */
        .content-card {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.9) 100%);
            border: 1px solid rgba(200, 220, 255, 0.3);
            animation: softGlow 3s ease-in-out infinite;
        }

        .content-item {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .content-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
            z-index: 10;
            pointer-events: none;
        }

        .content-item:hover::before {
            left: 100%;
        }

        .content-item:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }

        @keyframes softGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(96, 165, 250, 0.1);
            }
            50% {
                box-shadow: 0 0 30px rgba(96, 165, 250, 0.2);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200%;
            }
            100% {
                background-position: 200%;
            }
        }

        /* Optimización para iOS y móviles */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
            }
        }

        /* Evitar zoom en inputs en iOS */
        input, select, textarea {
            font-size: 16px;
        }

        /* Mejorar rendimiento en móviles */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Media queries para móviles */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: 100vh;
                height: 100dvh;
            }

            aside {
                width: 100% !important;
                flex-direction: row;
                padding: 8px;
                gap: 8px;
                align-items: center;
                justify-content: space-between;
                min-height: auto;
            }

            .sidebar-header {
                display: flex;
                align-items: center;
                gap: 12px;
                flex-shrink: 0;
            }

            .logo-container {
                margin-bottom: 0;
                min-width: 40px;
            }

            .logo-container img {
                max-height: 40px;
            }

            .sidebar-header h1 {
                font-size: 1.25rem;
                margin: 0;
            }

            .sidebar-header p {
                display: none;
            }

            #menu-navegacion {
                display: flex;
                flex-direction: row;
                gap: 4px;
                padding: 0 !important;
                flex: 1;
            }

            #menu-navegacion button {
                padding: 6px 10px !important;
                font-size: 0.75rem;
                flex: 1;
            }

            .sidebar-footer {
                display: none;
            }

            main {
                flex: 1;
                width: 100%;
                overflow-y: auto;
                height: auto;
            }

            #contenido-seccion {
                padding: 16px !important;
                max-width: none !important;
                margin: auto !important;
                width: 100%;
            }

            .inicio-background {
                padding: 12px !important;
            }

            .inicio-background > div {
                max-width: none !important;
                padding: 16px !important;
            }

            header {
                padding: 8px !important;
                gap: 8px !important;
            }

            header input {
                width: 100% !important;
                display: block !important;
            }

            .relative input {
                display: none !important;
            }

            #btn-volver {
                padding: 6px 12px !important;
                font-size: 0.875rem !important;
            }

            #titulo-seccion {
                font-size: 1.125rem !important;
            }
        }

        @media (max-width: 480px) {
            aside {
                flex-wrap: wrap;
            }

            .sidebar-header h1 {
                font-size: 1rem;
                display: none;
            }

            .logo-container img {
                max-height: 35px;
            }

            #menu-navegacion button {
                padding: 4px 8px !important;
                font-size: 0.65rem !important;
                flex: 1;
            }

            #contenido-seccion {
                padding: 12px !important;
            }
        }

    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">
    <div class="app-background" aria-hidden="true">
        <div class="bg-orb orb-a"></div>
        <div class="bg-orb orb-b"></div>
        <div class="bg-orb orb-c"></div>
        <svg class="bg-wave" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path class="bg-path path-a" d="M80 220C230 120 300 140 410 220C520 300 610 340 710 300C780 276 865 214 930 156" />
            <path class="bg-path path-b" d="M70 410C170 320 280 320 380 395C480 470 590 520 690 492C770 470 860 402 940 340" />
        </svg>
    </div>
    <div id="cursor-trail" aria-hidden="true"></div>

    <!-- Menú Lateral (Sidebar) -->
    <aside class="w-64 bg-blue-900/95 text-white flex flex-col shadow-xl border-r border-white/10" style="-webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);">
        <!-- Fondo animado de ADN -->
        <video class="sidebar-dna-bg" autoplay muted playsinline loop disablePictureInPicture>
            <source src="./assets/Hélice ADN.mp4" type="video/mp4">
        </video>

        <!-- Encabezado con logo -->
        <div class="sidebar-header p-6">
            <div class="logo-container">
                <img src="./assets/Logo.jpg" alt="Logo IGEA">
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-center">IGEA Adm</h1>
            <p class="text-sm text-blue-300 mt-1 text-center">Portal de Gestión</p>
        </div>

        <!-- Navegación -->
        <nav class="flex-1 px-4 space-y-2" id="menu-navegacion">
            <!-- Botones de navegación. Les agregué un ID para manejar el estado "activo" -->
            <button id="btn-inicio" onclick="cambiarVista('inicio')" class="w-full flex items-center p-3 text-left bg-blue-800 rounded-lg transition shadow-inner">
                <span>🏠 Inicio</span>
            </button>
            <button id="btn-dpp" onclick="cambiarVista('dpp')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                <span>👥 DPP</span>
            </button>
            <button id="btn-procedimientos" onclick="cambiarVista('procedimientos')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                <span>📋 Procedimientos</span>
            </button>
        </nav>

        <!-- Pie de página -->
        <div class="sidebar-footer p-4 border-t border-blue-800/50">
            <p class="text-xs text-center text-blue-400">Versión 2.0</p>
        </div>
    </aside>

    <!-- Panel Central (Contenido Dinámico) -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto no-scrollbar relative" style="height: 100vh; height: 100dvh;">
        <!-- Encabezado superior -->
        <header class="bg-white/80 shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center border-b border-gray-200/50" style="-webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);">
            <div class="flex items-center gap-4">
                <!-- Botón de Volver (Oculto por defecto) -->
                <button id="btn-volver" onclick="volverAtras()" class="hidden text-blue-600 hover:text-blue-800 font-medium flex items-center transition bg-blue-50 px-3 py-1.5 rounded-md hover:bg-blue-100">
                    <span class="mr-1">←</span> Volver
                </button>
                <h2 id="titulo-seccion" class="text-xl font-semibold text-gray-800">Inicio</h2>
            </div>
            
            <!-- Buscador simulado -->
            <div class="relative">
                <input type="text" placeholder="Buscar..." class="bg-gray-100/50 border border-gray-200 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition w-48">
                <span class="absolute right-3 top-1.5 text-gray-400">🔍</span>
            </div>
        </header>

        <!-- Contenedor donde se inyectará el contenido -->
        <div id="contenido-seccion" class="p-8 w-full max-w-5xl mx-auto h-full">
            <!-- El contenido inicial se carga por defecto -->
        </div>
    </main>

    <!-- Lógica de la Aplicación (JavaScript) -->
    <script>
        // Detectar si es iOS o móvil
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        // EFECTOS VISUALES DEL CURSOR - Solo en desktop
        if (!isMobile) {
            const cursorTrail = document.getElementById('cursor-trail');
            const cursorGlow = document.createElement('div');
            cursorGlow.className = 'cursor-glow';
            cursorTrail.appendChild(cursorGlow);

            window.addEventListener('mousemove', (event) => {
                cursorGlow.style.left = `${event.clientX}px`;
                cursorGlow.style.top = `${event.clientY}px`;
                cursorGlow.style.opacity = '1';
            });

            window.addEventListener('mouseleave', () => {
                cursorGlow.style.opacity = '0';
            });
        } else {
            // En móviles, ocultar el cursor trail
            const cursorTrail = document.getElementById('cursor-trail');
            if (cursorTrail) cursorTrail.style.display = 'none';
        }

        // ==========================================
        // BASE DE DATOS DE ENLACES (DRIVE)
        // ==========================================
        const archivosDrive = {
            dpp: [
                {
                    nombre: "Coordinador Operativo, Administrativo y de Finanzas",
                    area: "Administración y Finanzas",
                    url: "https://docs.google.com/document/d/1IaOfr1qIjGI6kKGbioG84X5zZU9oOaoF/preview"
                },
                {
                    nombre: "Administrativa de Admisión y Atención al Público",
                    area: "Admisión y Atención al Público",
                    url: "https://docs.google.com/document/d/1RiU2YNFAs7DHN_Ee9oO-YDo1ppAAXEqQ/preview"
                },
                {
                    nombre: "Operadora de Atención Digital",
                    area: "Atención Digital",
                    url: "https://docs.google.com/document/d/1GWxd8yy_GNYTy2f_nVKRkeO1ZUTQV3yw/preview"
                },
                {
                    nombre: "Administrativa de Enlace Institucional",
                    area: "Enlace Institucional",
                    url: "https://docs.google.com/document/d/1kFfqGuGzD6b7bhr6UnMMTIZjJQ0Y-J_i/preview"
                },
                {
                    nombre: "Responsable de Tesorería y Pagos",
                    area: "Tesorería y Pagos",
                    url: "https://docs.google.com/document/d/1JVqhA8iW0_aypK80JmGiVjbJBuSAOvQe/preview"
                }
            ],
            procedimientos: [
                {
                    nombre: "Gestión de Vacaciones y Licencias Especiales",
                    fecha: "07/07/2026",
                    url: "https://docs.google.com/document/d/1wYzmFrBZG0qQ3C9_HbHoHcUJDIwE-VcP/preview"
                }
            ]
        };

        // Variable para recordar en qué sección estábamos
        let seccionActual = 'inicio';

        // ==========================================
        // FUNCIONES DE RENDERIZADO
        // ==========================================

        function renderizarInicio() {
            return `
                <div class="inicio-background w-full h-full rounded-2xl overflow-hidden flex items-center justify-center p-8">
                    <div class="bg-white/85 p-8 rounded-2xl shadow-lg border border-white/60 max-w-2xl" style="-webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);">
                        <h3 class="text-3xl font-bold text-blue-900 mb-4">Intranet Administración</h3>
                        <p class="text-gray-600 mb-8 text-lg">Desde esta aplicación vas a poder gestionar todos los recursos del área de manera rápida y centralizada, con documentos actualizados en tiempo real.</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-gradient-to-br from-blue-50 to-white p-6 rounded-xl border border-blue-100 shadow-sm hover:shadow-md cursor-pointer hover:-translate-y-1 transition duration-300" onclick="cambiarVista('dpp')">
                                <div class="text-4xl mb-3">👥</div>
                                <h4 class="font-bold text-xl text-blue-900">Descripciones de Perfil y Puestos</h4>
                                <p class="text-gray-600 mt-2">Consultá las Descripciones de Perfil y Puestos de todo el equipo de IGEA.</p>
                            </div>
                            <div class="bg-gradient-to-br from-emerald-50 to-white p-6 rounded-xl border border-emerald-100 shadow-sm hover:shadow-md cursor-pointer hover:-translate-y-1 transition duration-300" onclick="cambiarVista('procedimientos')">
                                <div class="text-4xl mb-3">📋</div>
                                <h4 class="font-bold text-xl text-emerald-900">Procedimientos</h4>
                                <p class="text-gray-600 mt-2">Accedé a la normativa vigente, manuales y protocolos internos.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderizarDPP() {
            let filasHTML = archivosDrive.dpp.map(doc => `
                <div class="content-item p-4 border-b border-gray-100 flex justify-between items-center hover:bg-blue-50 transition cursor-pointer" onclick="abrirDocumento('${doc.nombre}', '${doc.url}')">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-100 text-blue-600 p-2 rounded-lg">👤</div>
                        <div>
                            <span class="font-semibold text-gray-800 block">${doc.nombre}</span>
                        </div>
                    </div>
                    <button class="bg-white border border-gray-200 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-600 hover:text-white transition shadow-sm text-sm font-medium">Ver Perfil</button>
                </div>
            `).join('');

            return `
                <div class="content-card p-6 rounded-2xl shadow-lg">
                    <p class="text-gray-600 mb-6">Seleccioná una DPP</p>
                    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                        ${filasHTML}
                    </div>
                </div>
            `;
        }

        function renderizarProcedimientos() {
            let itemsHTML = archivosDrive.procedimientos.map(doc => `
                <li class="content-item flex items-center justify-between p-4 bg-white rounded-xl border border-gray-200 shadow-sm cursor-pointer" onclick="abrirDocumento('${doc.nombre}', '${doc.url}')">
                    <div class="flex items-center">
                        <span class="text-3xl mr-4 p-2 bg-emerald-50 rounded-lg">📄</span>
                        <div>
                            <h4 class="font-semibold text-gray-800 text-lg">${doc.nombre}</h4>
                            <p class="text-sm text-emerald-600 font-medium">Actualizado: ${doc.fecha}</p>
                        </div>
                    </div>
                    <span class="text-gray-400 hover:text-emerald-600 transition">➜</span>
                </li>
            `).join('');

            return `
                <div class="space-y-4">
                    ${itemsHTML}
                </div>
            `;
        }

        // ==========================================
        // CONTROLADORES DE LA INTERFAZ
        // ==========================================

        function actualizarMenuActivo(vista) {
            document.getElementById('btn-inicio').className = "w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition";
            document.getElementById('btn-dpp').className = "w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition";
            document.getElementById('btn-procedimientos').className = "w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition";
            
            if(vista === 'inicio' || vista === 'dpp' || vista === 'procedimientos') {
                document.getElementById(`btn-${vista}`).className = "w-full flex items-center p-3 text-left bg-blue-800 rounded-lg transition shadow-inner";
            }
        }

        function cambiarVista(vista) {
            const contenedorContenido = document.getElementById('contenido-seccion');
            const tituloSeccion = document.getElementById('titulo-seccion');
            const btnVolver = document.getElementById('btn-volver');
            
            seccionActual = vista;
            actualizarMenuActivo(vista);
            btnVolver.classList.add('hidden'); 

            if (vista === 'inicio') {
                tituloSeccion.textContent = "Inicio";
                contenedorContenido.innerHTML = renderizarInicio();
            } else if (vista === 'dpp') {
                tituloSeccion.textContent = "Descripción de Perfil y Puestos (DPP)";
                contenedorContenido.innerHTML = renderizarDPP();
            } else if (vista === 'procedimientos') {
                tituloSeccion.textContent = "Procedimientos Normativos";
                contenedorContenido.innerHTML = renderizarProcedimientos();
            }
        }

        function abrirDocumento(titulo, url) {
            const contenedorContenido = document.getElementById('contenido-seccion');
            const tituloSeccion = document.getElementById('titulo-seccion');
            const btnVolver = document.getElementById('btn-volver');

            tituloSeccion.textContent = titulo;
            btnVolver.classList.remove('hidden');
            actualizarMenuActivo('');

            contenedorContenido.innerHTML = `
                <div class="w-full h-[calc(100vh-12rem)] bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden relative">
                    <div class="absolute inset-0 flex items-center justify-center bg-gray-50 z-0">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                    <iframe 
                        src="${url}" 
                        class="w-full h-full relative z-10 border-0"
                        allow="autoplay">
                    </iframe>
                </div>
            `;
        }

        function volverAtras() {
            cambiarVista(seccionActual);
        }

        window.onload = () => cambiarVista('inicio');
    </script>
