<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Firma Digital</title>
    <!-- Usamos Tailwind para que se vea lindo -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-xl font-bold text-gray-800 mb-2">Conformidad de Recibo</h2>
        <p class="text-sm text-gray-600 mb-4">Por favor, dibujá tu firma en el recuadro inferior:</p>
        
        <!-- Este es el "Lienzo" donde ocurre la magia -->
        <canvas id="panel-firma" width="380" height="200" 
            class="border-2 border-dashed border-gray-300 rounded-lg bg-gray-50 cursor-crosshair touch-none">
        </canvas>

        <div class="flex justify-between mt-4">
            <!-- Botón para borrar el lienzo -->
            <button onclick="limpiarFirma()" 
                class="px-4 py-2 text-sm text-red-600 border border-red-200 rounded hover:bg-red-50 transition">
                Volver a intentar
            </button>
            <!-- Botón para guardar -->
            <button onclick="guardarFirma()" 
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                Firmar documento
            </button>
        </div>
    </div>

    <!-- Documentación de la lógica de programación -->
    <script>
        // 1. Apuntamos al lienzo en el HTML
        const canvas = document.getElementById('panel-firma');
        // 2. Le decimos al navegador que vamos a dibujar en 2 Dimensiones
        const contexto = canvas.getContext('2d');
        
        // Variables para saber si el usuario está apretando el clic
        let dibujando = false;

        // Configuración estética del "lápiz"
        contexto.lineWidth = 2; // Grosor de la línea
        contexto.strokeStyle = '#000000'; // Color negro
        contexto.lineCap = 'round'; // Puntas redondeadas para que parezca tinta

        // 3. Funciones para detectar el movimiento del mouse
        function iniciarDibujo(evento) {
            dibujando = true;
            contexto.beginPath();
            contexto.moveTo(evento.offsetX, evento.offsetY);
        }

        function dibujar(evento) {
            if (dibujando === true) {
                contexto.lineTo(evento.offsetX, evento.offsetY);
                contexto.stroke();
            }
        }

        function detenerDibujo() {
            dibujando = false;
        }

        // 4. Conectamos el mouse con las funciones
        canvas.addEventListener('mousedown', iniciarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', detenerDibujo);
        canvas.addEventListener('mouseout', detenerDibujo); // Por si se sale del recuadro

        // Función para blanquear el lienzo
        function limpiarFirma() {
            contexto.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Función para empaquetar la firma
        function guardarFirma() {
            // .toDataURL() convierte el dibujo en un texto enorme que podemos guardar en la base de datos
            const imagenFirma = canvas.toDataURL('image/png'); 
            console.log("Código de la firma listo para Firebase: ", imagenFirma);
            alert("¡Firma capturada con éxito! En el próximo paso la enviaremos a Firebase.");
        }
    </script>
</body>
</html>
