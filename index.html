    <style>
        body { 
            position: relative; 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
        }
        
        .app-background {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.08), transparent 40%),
                radial-gradient(circle at 80% 16%, rgba(16, 185, 129, 0.05), transparent 35%),
                linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .material-symbols-rounded {
            font-size: 20px;
            vertical-align: middle;
        }
        .icon-large { font-size: 32px; }

        @keyframes entradaLogo {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animar-entrada {
            animation: entradaLogo 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes flotarLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .animar-flotar {
            animation: flotarLogo 4s ease-in-out infinite;
        }
    </style>
</head>

    <!-- CONFIGURACIÓN DE FIREBASE Y FIRESTORE      -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg0u_Se2Od--7wbZFwqWKRdUv_IrYiXw0",
            authDomain: "intranet-igea.firebaseapp.com",
            projectId: "intranet-igea",
            storageBucket: "intranet-igea.appspot.com",
            messagingSenderId: "53285656859",
            appId: "1:53285656859:web:b98b85861bd5d0472e1bbe"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Escucha en tiempo real de sugerencias
        const sugerenciasRef = collection(db, "sugerencias");
        const q = query(sugerenciasRef, orderBy("fechaCreacion", "desc"));

        onSnapshot(q, (snapshot) => {
            listaSugerencias = [];
            snapshot.forEach((docSnap) => {
                listaSugerencias.push({
                    id: docSnap.id,
                    ...docSnap.data()
                });
            });
            if (seccionActual === 'sugerencias') {
                cambiarVista('sugerencias');
            }
        });

        onAuthStateChanged(auth, (user) => {
            const pantallaLogin = document.getElementById('pantalla-login');
            const appPrincipal = document.getElementById('aplicacion-principal');

            if (user) {
                usuarioActualEmail = user.email;
                const empleadoEncontrado = baseRecibos.find(emp => emp.email.toLowerCase() === user.email.toLowerCase());
                
                if (empleadoEncontrado) {
                    document.getElementById('nombre-usuario-header').textContent = empleadoEncontrado.nombre;
                } else {
                    document.getElementById('nombre-usuario-header').textContent = user.email;
                }
                
                pantallaLogin.classList.add('hidden');
                appPrincipal.classList.remove('hidden');
                
                cambiarVista('inicio');
            } else {
                usuarioActualEmail = "";
                pantallaLogin.classList.remove('hidden');
                appPrincipal.classList.add('hidden');
            }
        });

        // Guardado de sugerencias
        window.guardarSugerenciaFirebase = function() {
            const texto = document.getElementById('texto-sugerencia').value.trim();
            const esAnonimo = document.getElementById('check-anonimo').checked;

            if(!texto) { alert("Por favor, escribí un texto para tu idea."); return; }

            let nombreAutor = "Anónimo";
            if (!esAnonimo) {
                const empleadoEncontrado = baseRecibos.find(emp => emp.email.toLowerCase() === usuarioActualEmail.toLowerCase());
                if (empleadoEncontrado) {
                    let partesDelNombre = empleadoEncontrado.nombre.trim().split(/\s+/);
                    nombreAutor = partesDelNombre.pop();
                }
            }

            const nuevaIdea = {
                texto: texto,
                color: colorPostitSeleccionado,
                autor: nombreAutor,
                fecha: new Date().toLocaleDateString('es-AR'),
                fechaCreacion: new Date(),
                reacciones: { meGusta: 0, buenaIdea: 0, meEncanta: 0 },
                reaccionados: {} // Registro de correos de usuarios que ya votaron
            };

            addDoc(sugerenciasRef, nuevaIdea).then(() => {
                cerrarModalSugerencia();
            }).catch((error) => {
                alert("Error al guardar la sugerencia: " + error.message);
            });
        };

        // LÓGICA DE CONTROL: 1 voto por usuario con posibilidad de cambiar de opinión
        window.reaccionarFirebase = function(docId, tipoReaccion) {
            if (!usuarioActualEmail) return;

            const sugerenciaDocRef = doc(db, "sugerencias", docId);
            const sug = listaSugerencias.find(s => s.id === docId);
            if (!sug) return;

            let userKey = usuarioActualEmail.toLowerCase().replace(/\./g, '_'); // Clave limpia para el mapa
            let reaccionados = sug.reaccionados || {};
            let reaccionAnterior = reaccionados[userKey];

            let cambios = {};

            if (reaccionAnterior) {
                if (reaccionAnterior === tipoReaccion) {
                    alert("Ya reaccionaste con este emoji a esta sugerencia.");
                    return;
                } else {
                    // Cambió su voto: restamos el anterior, sumamos el nuevo
                    cambios[`reacciones.${reaccionAnterior}`] = increment(-1);
                    cambios[`reacciones.${tipoReaccion}`] = increment(1);
                    cambios[`reaccionados.${userKey}`] = tipoReaccion;
                }
            } else {
                // Primer voto del usuario en esta sugerencia
                cambios[`reacciones.${tipoReaccion}`] = increment(1);
                cambios[`reaccionados.${userKey}`] = tipoReaccion;
            }

            updateDoc(sugerenciaDocRef, cambios).catch((error) => {
                console.error("Error al registrar la reacción: ", error);
            });
        };

        window.iniciarSesionFirebase = function() {
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            if(!email || !password) { alert("Por favor, completá todos los datos."); return; }
            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => alert("Error: Verificá tus credenciales."));
        };

        window.recuperarClaveFirebase = function() {
            const email = document.getElementById('input-email').value;
            if(!email) { alert("Por favor, escribí tu correo electrónico arriba y volvé a presionar este botón."); return; }
            sendPasswordResetEmail(auth, email)
                .then(() => alert("¡Correo enviado a " + email + "! Revisá tu bandeja de entrada."))
                .catch((error) => alert("Error al enviar el correo."));
        };

        window.cerrarSesion = function() {
            signOut(auth).then(() => {
                document.getElementById('input-password').value = ''; 
                document.getElementById('input-email').value = ''; 
            });
        };

        window.cambiarClaveFirebase = function() {
            const user = auth.currentUser;
            const nuevaClave = document.getElementById('input-nueva-clave').value;

            if(!nuevaClave || nuevaClave.length < 6) {
                alert("Por favor, ingresá una contraseña que tenga al menos 6 caracteres.");
                return;
            }

            if(user) {
                updatePassword(user, nuevaClave).then(() => {
                    alert("¡Excelente! Tecnológicamente tu contraseña se actualizó correctamente.");
                    cerrarModalClave(); 
                }).catch((error) => {
                    if(error.code === 'auth/requires-recent-login') {
                        alert("Por seguridad, cerrá sesión y volvé a ingresar para cambiar la clave.");
                    } else {
                        alert("Error al actualizar: " + error.message);
                    }
                });
            }
        };
    </script>
</body>

</html>
