<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGEA - Intranet App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { position: relative; background-color: #f8fafc; }
        .app-background {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 35%),
                radial-gradient(circle at 80% 16%, rgba(16, 185, 129, 0.10), transparent 30%),
                linear-gradient(135deg, #f0f7ff 0%, #e6f4ff 50%, #f0fbf4 100%);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="text-gray-800 font-sans flex h-screen overflow-hidden">
    <div class="app-background" aria-hidden="true"></div>

    <!-- PANTALLA DE LOGIN GLOBAL -->
    <div id="pantalla-login" class="absolute inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm transition-opacity">
        <div class="bg-white p-8 rounded-2xl shadow-2xl border border-gray-100 max-w-md w-full relative">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-blue-900 tracking-wider mb-1">IGEA</h1>
                <h2 class="text-lg font-medium text-gray-600">Portal Interno</h2>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="input-email" 
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                        placeholder="tu.correo@igea.com.ar">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="input-password" 
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                        placeholder="••••••••">
                </div>
                
                <div class="flex justify-end mt-2">
                    <button onclick="window.recuperarClaveFirebase()" class="text-xs text-blue-600 hover:underline">¿Olvidaste tu contraseña?</button>
                </div>

                <button onclick="window.iniciarSesionFirebase()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition shadow-md mt-4">
                    Ingresar a la Intranet
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL (VENTANA FLOTANTE) PARA CAMBIAR CONTRASEÑA -->
    <div id="modal-clave" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-xl shadow-xl w-96 relative">
            <h3 class="text-lg font-bold text-blue-900 mb-4">Cambiar mi contraseña</h3>
            <p class="text-sm text-gray-600 mb-4">Ingresá tu nueva clave. Recordá que debe tener al menos 6 caracteres.</p>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Nueva Contraseña</label>
            <input type="password" id="input-nueva-clave" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2 mb-6 focus:ring-2 focus:ring-blue-400 focus:outline-none" placeholder="Escribí acá...">
            
            <div class="flex justify-end gap-3">
                <button onclick="cerrarModalClave()" class="px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
                <button onclick="window.cambiarClaveFirebase()" class="px-4 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg transition">Guardar Clave</button>
            </div>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="aplicacion-principal" class="hidden flex h-screen w-full relative z-10">
        
        <!-- Menú Lateral -->
        <aside class="w-64 bg-blue-900/95 backdrop-blur-md text-white flex flex-col shadow-xl border-r border-white/10">
            <div class="p-6">
                <h1 class="text-2xl font-bold tracking-wider">IGEA Adm</h1>
                <p class="text-sm text-blue-300 mt-1">Portal de Gestión</p>
            </div>
            <nav class="flex-1 px-4 space-y-2" id="menu-navegacion">
                <button id="btn-inicio" onclick="cambiarVista('inicio')" class="w-full flex items-center p-3 text-left bg-blue-800 rounded-lg transition shadow-inner">
                    <span>🏠 Inicio</span>
                </button>
                <button id="btn-dpp" onclick="cambiarVista('dpp')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                    <span>👥 DPP</span>
                </button>
                <button id="btn-procedimientos" onclick="cambiarVista('procedimientos')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                    <span>📋 Procedimientos</span>
                </button>
                <button id="btn-recibos" onclick="cambiarVista('recibos')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                    <span>📄 Mis Recibos de Sueldo</span>
                </button>
            </nav>
            <div class="p-4 border-t border-blue-800/50">
                <p class="text-xs text-center text-blue-400">Versión 3.2 (Nombres en Header)</p>
            </div>
        </aside>

        <!-- Panel Central -->
        <main class="flex-1 flex flex-col h-screen overflow-y-auto no-scrollbar">
            <!-- Encabezado superior -->
            <header class="bg-white/80 backdrop-blur-sm shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center border-b border-gray-200/50">
                <div class="flex items-center gap-4">
                    <button id="btn-volver" onclick="volverAtras()" class="hidden text-blue-600 font-medium flex items-center transition bg-blue-50 px-3 py-1.5 rounded-md hover:bg-blue-100">
                        <span class="mr-1">←</span> Volver
                    </button>
                    <h2 id="titulo-seccion" class="text-xl font-semibold text-gray-800">Inicio</h2>
                </div>
                
                <!-- Info de usuario y Botones de Sesión -->
                <div class="flex items-center gap-4">
                    <span id="nombre-usuario-header" class="text-sm text-gray-700 font-bold bg-gray-100 px-3 py-1 rounded-full">Cargando...</span>
                    <button onclick="abrirModalClave()" class="text-sm text-blue-600 hover:text-blue-800 font-medium transition">Cambiar Clave</button>
                    <span class="text-gray-300">|</span>
                    <button onclick="window.cerrarSesion()" class="text-sm text-red-600 hover:text-red-800 font-medium transition">Cerrar Sesión</button>
                </div>
            </header>

            <div id="contenido-seccion" class="p-8 w-full max-w-5xl mx-auto h-full">
                <!-- Contenido dinámico -->
            </div>
        </main>
    </div>

    <!-- Lógica JavaScript (Visual) -->

            { email: "orirocio@gmail.com", nombre: "PEIÑEPIL Oriana", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1IiyO99e_8glZyzM8i5TSp2OFgxMDNpjS#list" },

        const archivosDrive = {

                { nombre: "Coordinador Operativo, Administrativo y de Finanzas", area: "Administración y Finanzas", url: "https://docs.google.com/document/d/1IaOfr1qIjGI6kKGbioG84X5zZU9oOaoF/preview" },

            ],

                { nombre: "Guardia Administrativa y Gestión Remota", fecha: "20/07/2026", url: "https://docs.google.com/document/d/17_p1VdCKTV-EvsT4paMaSZw_jteOEJZ4/preview" }
            ]
        };

        let seccionActual = 'inicio';

        function abrirModalClave() {
            document.getElementById('modal-clave').classList.remove('hidden');
            document.getElementById('input-nueva-clave').value = ''; 
        }

        function cerrarModalClave() {
            document.getElementById('modal-clave').classList.add('hidden');
        }

        function renderizarInicio() {
            return `
                <div class="bg-white/90 p-8 rounded-2xl shadow-lg border border-white/50">
                    <h3 class="text-3xl font-bold text-blue-900 mb-4">Bienvenido al Portal de Administración</h3>
                    <p class="text-gray-600 mb-8 text-lg">Gestioná los recursos de manera rápida y centralizada.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-gradient-to-br from-blue-50 to-white p-6 rounded-xl border border-blue-100 shadow-sm hover:shadow-md cursor-pointer hover:-translate-y-1 transition duration-300" onclick="cambiarVista('dpp')">
                            <div class="text-4xl mb-3">👥</div>
                            <h4 class="font-bold text-xl text-blue-900">Directorio DPP</h4>
                            <p class="text-gray-600 mt-2">Consultá las Descripciones de Perfil y Puestos del equipo de IGEA.</p>
                        </div>
                        <div class="bg-gradient-to-br from-emerald-50 to-white p-6 rounded-xl border border-emerald-100 shadow-sm hover:shadow-md cursor-pointer hover:-translate-y-1 transition duration-300" onclick="cambiarVista('procedimientos')">
                            <div class="text-4xl mb-3">📋</div>
                            <h4 class="font-bold text-xl text-emerald-900">Procedimientos</h4>
                            <p class="text-gray-600 mt-2">Accedé a la normativa vigente y protocolos internos.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderizarDPP() {
            let filasHTML = archivosDrive.dpp.map(doc => `
                <div class="p-4 border-b border-gray-100 flex justify-between items-center hover:bg-blue-50 transition cursor-pointer" onclick="abrirDocumento('${doc.nombre}', '${doc.url}')">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-100 text-blue-600 p-2 rounded-lg">👤</div>
                        <div>
                            <span class="font-semibold text-gray-800 block">${doc.nombre}</span>
                            <span class="text-sm text-gray-500">${doc.area}</span>
                        </div>
                    </div>
                    <button class="bg-white border border-gray-200 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-600 hover:text-white transition shadow-sm text-sm font-medium">Ver Perfil</button>
                </div>
            `).join('');

            return `
                <div class="bg-white/90 p-6 rounded-2xl shadow-lg border border-white/50">
                    <p class="text-gray-600 mb-6">Seleccioná un perfil para ver el documento oficial.</p>
                    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                        ${filasHTML}
                    </div>
                </div>
            `;
        }

        function renderizarProcedimientos() {
            let itemsHTML = archivosDrive.procedimientos.map(doc => `
                <li class="flex items-center justify-between p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md hover:border-emerald-300 transition cursor-pointer" onclick="abrirDocumento('${doc.nombre}', '${doc.url}')">
                    <div class="flex items-center">
                        <span class="text-3xl mr-4 p-2 bg-emerald-50 rounded-lg">📄</span>
                        <div>
                            <h4 class="font-semibold text-gray-800 text-lg">${doc.nombre}</h4>
                            <p class="text-sm text-emerald-600 font-medium">Actualizado: ${doc.fecha}</p>
                        </div>
                    </div>
                    <span class="text-gray-400 hover:text-emerald-600 transition">➜</span>
                </li>
            `).join('');

            return `<div class="space-y-4">${itemsHTML}</div>`;
        }

        function renderizarRecibos() {
            const empleado = baseRecibos.find(emp => emp.email.toLowerCase() === usuarioActualEmail.toLowerCase());

            if (empleado) {
                return `
                    <div class="w-full h-[calc(100vh-12rem)] bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden relative">
                        <div id="spinner-carga" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-0">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                        <iframe src="${empleado.urlCarpeta}" class="w-full h-full relative z-10 border-0 bg-white"
                            onload="document.getElementById('spinner-carga').style.display='none'" allow="autoplay">
                        </iframe>
                    </div>
                `;
            } else {
                return `
                    <div class="bg-red-50 p-6 rounded-xl border border-red-200 text-center shadow-sm">
                        <h3 class="text-xl font-bold text-red-700 mb-2">Legajo no encontrado</h3>
                        <p class="text-red-600">Tu correo (${usuarioActualEmail}) no tiene una carpeta de recibos asociada. Comunicáte con Administración.</p>
                    </div>
                `;
            }
        }

        function actualizarMenuActivo(vista) {
            ['inicio', 'dpp', 'procedimientos', 'recibos'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if (btn) btn.className = "w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition";
            });
            const btnActivo = document.getElementById(`btn-${vista}`);
            if (btnActivo) btnActivo.className = "w-full flex items-center p-3 text-left bg-blue-800 rounded-lg transition shadow-inner";
        }

        function cambiarVista(vista) {
            seccionActual = vista;
            actualizarMenuActivo(vista);
            document.getElementById('btn-volver').classList.add('hidden');
            const contenido = document.getElementById('contenido-seccion');
            const titulo = document.getElementById('titulo-seccion');

            if (vista === 'inicio') { titulo.textContent = "Inicio"; contenido.innerHTML = renderizarInicio(); }
            if (vista === 'dpp') { titulo.textContent = "Directorio DPP"; contenido.innerHTML = renderizarDPP(); }
            if (vista === 'procedimientos') { titulo.textContent = "Procedimientos"; contenido.innerHTML = renderizarProcedimientos(); }
            if (vista === 'recibos') { titulo.textContent = "Legajo Digital Privado"; contenido.innerHTML = renderizarRecibos(); }
        }

        function abrirDocumento(titulo, url) {
            const contenedorContenido = document.getElementById('contenido-seccion');
            const tituloSeccion = document.getElementById('titulo-seccion');
            const btnVolver = document.getElementById('btn-volver');

            tituloSeccion.textContent = titulo;
            btnVolver.classList.remove('hidden');
            actualizarMenuActivo('');

            contenedorContenido.innerHTML = `
                <div class="w-full h-[calc(100vh-12rem)] bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden relative">
                    <div id="spinner-carga" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-0">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                    <iframe 
                        src="${url}" 
                        class="w-full h-full relative z-10 border-0 bg-white"
                        onload="document.getElementById('spinner-carga').style.display='none'"
                        allow="autoplay">
                    </iframe>
                </div>
            `;
        }

        function volverAtras() { cambiarVista(seccionActual); }
    </script>

    <!-- CONFIGURACIÓN DEL CEREBRO DE FIREBASE      -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg0u_Se2Od--7wbZFwqWKRdUv_IrYiXw0",
            authDomain: "intranet-igea.firebaseapp.com",
            projectId: "intranet-igea",
            storageBucket: "intranet-igea.appspot.com",
            messagingSenderId: "53285656859",
            appId: "1:53285656859:web:b98b85861bd5d0472e1bbe"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ACTUALIZAMOS EL VIGILANTE PARA QUE BUSQUE EL NOMBRE
        onAuthStateChanged(auth, (user) => {
            const pantallaLogin = document.getElementById('pantalla-login');
            const appPrincipal = document.getElementById('aplicacion-principal');

            if (user) {
                usuarioActualEmail = user.email;
                
                // LÓGICA NUEVA: Buscar el empleado por su correo
                const empleadoEncontrado = baseRecibos.find(emp => emp.email.toLowerCase() === user.email.toLowerCase());
                
                // Si lo encontramos en la lista mostramos su nombre, sino dejamos su mail por defecto
                if (empleadoEncontrado) {
                    document.getElementById('nombre-usuario-header').textContent = empleadoEncontrado.nombre;
                } else {
                    document.getElementById('nombre-usuario-header').textContent = user.email;
                }
                
                pantallaLogin.classList.add('hidden');
                appPrincipal.classList.remove('hidden');
                cambiarVista('inicio');
            } else {
                usuarioActualEmail = "";
                pantallaLogin.classList.remove('hidden');
                appPrincipal.classList.add('hidden');
            }
        });

        window.iniciarSesionFirebase = function() {
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            if(!email || !password) { alert("Por favor, completá todos los datos."); return; }
            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => alert("Error: Verificá tus credenciales."));
        };

        window.recuperarClaveFirebase = function() {
            const email = document.getElementById('input-email').value;
            if(!email) { alert("Por favor, escribí tu correo electrónico arriba y volvé a presionar este botón."); return; }
            sendPasswordResetEmail(auth, email)
                .then(() => alert("¡Correo enviado a " + email + "! Revisá tu bandeja de entrada."))
                .catch((error) => alert("Error al enviar el correo. (" + error.message + ")"));
        };

        window.cerrarSesion = function() {
            signOut(auth).then(() => {
                document.getElementById('input-password').value = ''; 
                document.getElementById('input-email').value = ''; 
            });
        };

        window.cambiarClaveFirebase = function() {
            const user = auth.currentUser;
            const nuevaClave = document.getElementById('input-nueva-clave').value;

            if(!nuevaClave || nuevaClave.length < 6) {
                alert("Por favor, ingresá una contraseña que tenga al menos 6 caracteres.");
                return;
            }

            if(user) {
                updatePassword(user, nuevaClave).then(() => {
                    alert("¡Excelente! Tu contraseña se actualizó correctamente.");
                    cerrarModalClave(); 
                }).catch((error) => {
                    if(error.code === 'auth/requires-recent-login') {
                        alert("Por seguridad, para cambiar la clave tenés que haber iniciado sesión recientemente. Por favor, cerrá sesión, volvé a ingresar e intentalo de nuevo.");
                    } else {
                        alert("Error al actualizar la contraseña: " + error.message);
                    }
                });
            }
        };
    </script>
</body>
