<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGEA - Portal Interno</title>
    
    <!-- Importamos Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuente Corporativa Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Iconografía Profesional de Google -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <style>
        body { 
            position: relative; 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
        }
        
        .app-background {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.08), transparent 40%),
                radial-gradient(circle at 80% 16%, rgba(16, 185, 129, 0.05), transparent 35%),
                linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .material-symbols-rounded {
            font-size: 20px;
            vertical-align: middle;
        }
        .icon-large { font-size: 32px; }

        @keyframes entradaLogo {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animar-entrada {
            animation: entradaLogo 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes flotarLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .animar-flotar {
            animation: flotarLogo 4s ease-in-out infinite;
        }
    </style>
</head>

<body class="text-slate-800 flex h-screen overflow-hidden">
    <div class="app-background" aria-hidden="true"></div>

    <!-- PANTALLA DE LOGIN GLOBAL -->

                </div>
                <h2 class="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-widest">Portal de Gestión</h2>
            </div>
            
            <div class="space-y-4 md:space-y-5">

                        <input type="email" id="input-email"

                            placeholder="tu.correo@igea.com.ar">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Contraseña</label>
                    <div class="relative">
                        <span class="material-symbols-rounded absolute left-3 top-2.5 text-slate-400">lock</span>
                        <input type="password" id="input-password" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition-all"
                            placeholder="••••••••">
                    </div>
                </div>
                
                <div class="flex justify-end mt-1">
                    <button onclick="window.recuperarClaveFirebase()" class="text-xs font-medium text-blue-600 hover:text-blue-700 transition">¿Olvidaste tu contraseña?</button>
                </div>

                <button onclick="window.iniciarSesionFirebase()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-blue-200 mt-2">
                    Ingresar
                </button>

        </div>
    </div>

    <!-- MODAL DE CAMBIO DE CLAVE -->

            <div class="flex items-center gap-3 mb-4">
                <span class="material-symbols-rounded text-blue-600">key</span>
                <h3 class="text-lg font-bold text-slate-800">Cambiar contraseña</h3>
            </div>
            <p class="text-sm text-slate-600 mb-5">Ingresá tu nueva clave (mínimo 6 caracteres).</p>
            <input type="password" id="input-nueva-clave" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 mb-6 focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="Nueva contraseña...">

                    </button>
                    <h2 id="titulo-seccion" class="text-lg md:text-2xl font-bold text-slate-800 tracking-tight">Inicio</h2>
                </div>

                    <div class="flex items-center gap-2">

                            <span class="material-symbols-rounded" style="font-size: 16px;">person</span>
                        </div>
                        <span id="nombre-usuario-header" class="text-xs md:text-sm text-slate-700 font-semibold truncate max-w-[120px] md:max-w-none">Cargando...</span>
                    </div>
                    <div class="w-px h-5 bg-slate-200"></div>
                    <button onclick="abrirModalClave()" class="text-slate-500 hover:text-blue-600 transition flex items-center gap-1" title="Cambiar Clave">
                        <span class="material-symbols-rounded" style="font-size: 18px;">settings</span>
                    </button>
                    <button onclick="window.cerrarSesion()" class="text-slate-500 hover:text-red-600 transition flex items-center gap-1" title="Cerrar Sesión">
                        <span class="material-symbols-rounded" style="font-size: 18px;">logout</span>
                    </button>
                </div>
            </header>

            <div id="contenido-seccion" class="p-4 md:p-8 w-full max-w-6xl mx-auto h-full">
                <!-- Contenido dinámico -->
            </div>
        </main>
    </div>

        function renderizarDPP() {
            let filasHTML = archivosDrive.dpp.map(doc => `
                <div class="p-4 md:p-5 border-b border-slate-100 flex justify-between items-center hover:bg-slate-50 transition cursor-pointer group" onclick="abrirDocumento('${doc.nombre}', '${doc.url}')">

                        <div class="bg-blue-50 text-blue-600 p-2.5 md:p-3 rounded-xl group-hover:bg-blue-100 transition">
                            <span class="material-symbols-rounded">person_pin</span>
                        </div>
                        <div>
                            <span class="font-bold text-slate-800 block text-sm md:text-lg">${doc.nombre}</span>
                            <span class="text-xs md:text-sm font-medium text-slate-500">${doc.area}</span>
                        </div>
                    </div>
                    <button class="text-slate-400 group-hover:text-blue-600 transition flex items-center">
                        <span class="material-symbols-rounded">open_in_new</span>
                    </button>
                </div>
            `).join('');

            return `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-4 md:p-6 border-b border-slate-100 bg-slate-50/50">

                    </div>
                    <div>${filasHTML}</div>
                </div>
            `;
        }

                    <div class="flex items-center gap-3 md:gap-4">
                        <div class="bg-emerald-50 text-emerald-600 p-2.5 md:p-3 rounded-xl group-hover:bg-emerald-100 transition">
                            <span class="material-symbols-rounded">description</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800 text-sm md:text-lg">${doc.nombre}</h4>
                            <p class="text-xs md:text-sm text-slate-500 font-medium mt-1 flex items-center gap-1">
                                <span class="material-symbols-rounded" style="font-size: 14px;">update</span> Actualizado: ${doc.fecha}
                            </p>
                        </div>
                    </div>
                    <span class="material-symbols-rounded text-slate-300 group-hover:text-emerald-500 transition">arrow_forward_ios</span>
                </div>
            `).join('');

            return `<div class="space-y-4">${itemsHTML}</div>`;
        }

        function renderizarRecibos() {
            const empleado = baseRecibos.find(emp => emp.email.toLowerCase() === usuarioActualEmail.toLowerCase());

            if (empleado) {
                let idCarpeta = empleado.urlCarpeta.split('id=')[1].split('#')[0];
                let linkDirecto = `https://drive.google.com/drive/folders/${idCarpeta}`;

                return `
                    <div class="mb-4 flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200 gap-3">
                        <span class="text-xs md:text-sm text-slate-600 font-medium text-center sm:text-left">¿Problemas para visualizar abajo? Abrila en una pestaña nueva:</span>
                        <a href="${linkDirecto}" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl transition shadow-sm flex items-center gap-1.5 shrink-0">
                            <span class="material-symbols-rounded" style="font-size: 16px;">open_in_new</span> Abrir en Google Drive
                        </a>
                    </div>
                    <div class="w-full h-[calc(100vh-14rem)] md:h-[calc(100vh-16rem)] bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden relative">
                        <div id="spinner-carga" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-0">
                            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                            <span class="text-xs md:text-sm font-medium text-slate-500">Conectando con Google Drive...</span>
                        </div>
                        <iframe src="${empleado.urlCarpeta}" class="w-full h-full relative z-10 border-0 bg-white"
                            onload="document.getElementById('spinner-carga').style.display='none'" allow="autoplay">
                        </iframe>
                    </div>
                `;
            } else {
                return `
                    <div class="bg-red-50 p-6 md:p-8 rounded-3xl border border-red-100 text-center flex flex-col items-center">
                        <span class="material-symbols-rounded text-red-400 text-5xl mb-3">error</span>
                        <h3 class="text-lg md:text-xl font-bold text-red-800 mb-2">Legajo no vinculado</h3>
                        <p class="text-xs md:text-sm text-red-600 font-medium">El correo ${usuarioActualEmail} no tiene una carpeta asociada en el sistema.</p>
                    </div>
                `;
            }
        }

        function actualizarMenuActivo(vista) {
            ['inicio', 'dpp', 'procedimientos', 'recibos'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if (btn) btn.className = "flex items-center gap-2 md:gap-3 p-2.5 md:p-3 text-left text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium rounded-xl transition shrink-0";
            });
            const btnActivo = document.getElementById(`btn-${vista}`);
            if (btnActivo) btnActivo.className = "flex items-center gap-2 md:gap-3 p-2.5 md:p-3 text-left bg-blue-50 text-blue-700 font-medium rounded-xl transition shadow-sm shrink-0";
        }

        function cambiarVista(vista) {
            seccionActual = vista;
            actualizarMenuActivo(vista);
            document.getElementById('btn-volver').classList.add('hidden');
            const contenido = document.getElementById('contenido-seccion');
            const titulo = document.getElementById('titulo-seccion');

            if (vista === 'inicio') { titulo.textContent = "Inicio"; contenido.innerHTML = renderizarInicio(); }
            if (vista === 'dpp') { titulo.textContent = "Directorio de Perfiles"; contenido.innerHTML = renderizarDPP(); }
            if (vista === 'procedimientos') { titulo.textContent = "Procedimientos Internos"; contenido.innerHTML = renderizarProcedimientos(); }
            if (vista === 'recibos') { titulo.textContent = "Legajo Digital"; contenido.innerHTML = renderizarRecibos(); }
        }

        function abrirDocumento(titulo, url) {
            const contenedorContenido = document.getElementById('contenido-seccion');
            const tituloSeccion = document.getElementById('titulo-seccion');
            const btnVolver = document.getElementById('btn-volver');

            tituloSeccion.textContent = titulo;
            btnVolver.classList.remove('hidden');
            actualizarMenuActivo('');

            contenedorContenido.innerHTML = `
                <div class="w-full h-[calc(100vh-14rem)] md:h-[calc(100vh-12rem)] bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden relative">
                    <div id="spinner-carga" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-0">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                        <span class="text-xs md:text-sm font-medium text-slate-500">Cargando documento...</span>
                    </div>
                    <iframe 
                        src="${url}" 
                        class="w-full h-full relative z-10 border-0 bg-white"
                        onload="document.getElementById('spinner-carga').style.display='none'"
                        allow="autoplay">
                    </iframe>
                </div>
            `;
        }

        function volverAtras() { cambiarVista(seccionActual); }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg0u_Se2Od--7wbZFwqWKRdUv_IrYiXw0",
            authDomain: "intranet-igea.firebaseapp.com",
            projectId: "intranet-igea",
            storageBucket: "intranet-igea.appspot.com",
            messagingSenderId: "53285656859",
            appId: "1:53285656859:web:b98b85861bd5d0472e1bbe"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const pantallaLogin = document.getElementById('pantalla-login');
            const appPrincipal = document.getElementById('aplicacion-principal');

            if (user) {
                usuarioActualEmail = user.email;
                const empleadoEncontrado = baseRecibos.find(emp => emp.email.toLowerCase() === user.email.toLowerCase());
                
                if (empleadoEncontrado) {
                    document.getElementById('nombre-usuario-header').textContent = empleadoEncontrado.nombre;
                } else {
                    document.getElementById('nombre-usuario-header').textContent = user.email;
                }
                
                pantallaLogin.classList.add('hidden');
                appPrincipal.classList.remove('hidden');
                
                cambiarVista('inicio');
            } else {
                usuarioActualEmail = "";
                pantallaLogin.classList.remove('hidden');
                appPrincipal.classList.add('hidden');
            }
        });

        window.iniciarSesionFirebase = function() {
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            if(!email || !password) { alert("Por favor, completá todos los datos."); return; }
            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => alert("Error: Verificá tus credenciales."));
        };

        window.recuperarClaveFirebase = function() {
            const email = document.getElementById('input-email').value;
            if(!email) { alert("Por favor, escribí tu correo electrónico arriba y volvé a presionar este botón."); return; }
            sendPasswordResetEmail(auth, email)
                .then(() => alert("¡Correo enviado a " + email + "! Revisá tu bandeja de entrada."))
                .catch((error) => alert("Error al enviar el correo."));
        };

        window.cerrarSesion = function() {
            signOut(auth).then(() => {
                document.getElementById('input-password').value = ''; 
                document.getElementById('input-email').value = ''; 
            });
        };

        window.cambiarClaveFirebase = function() {
            const user = auth.currentUser;
            const nuevaClave = document.getElementById('input-nueva-clave').value;

            if(!nuevaClave || nuevaClave.length < 6) {
                alert("Por favor, ingresá una contraseña que tenga al menos 6 caracteres.");
                return;
            }

            if(user) {
                updatePassword(user, nuevaClave).then(() => {
                    alert("¡Excelente! Tecnológicamente tu contraseña se actualizó correctamente.");
                    cerrarModalClave(); 
                }).catch((error) => {
                    if(error.code === 'auth/requires-recent-login') {
                        alert("Por seguridad, cerrá sesión y volvé a ingresar para cambiar la clave.");
                    } else {
                        alert("Error al actualizar: " + error.message);
                    }
                });
            }
        };
    </script>
