<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGEA - Intranet App</title>
    <!-- Importamos Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { position: relative; background-color: #f8fafc; }
        .app-background {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.18), transparent 28%),
                radial-gradient(circle at 80% 16%, rgba(16, 185, 129, 0.16), transparent 24%),
                linear-gradient(135deg, #f7fbff 0%, #eef8ff 45%, #f8fff9 100%);
        }
        .app-background::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(14, 116, 144, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 116, 144, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.35; animation: driftGrid 18s linear infinite;
        }
        @keyframes driftGrid { from { transform: translateY(0); } to { transform: translateY(24px); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">
    <div class="app-background" aria-hidden="true"></div>

    <!-- PANTALLA DE LOGIN GLOBAL -->
    <div id="pantalla-login" class="absolute inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm transition-opacity">

            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-blue-900 tracking-wider mb-1">IGEA</h1>
                <h2 class="text-lg font-medium text-gray-600">Portal Interno</h2>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="input-email" 
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                        placeholder="tu.correo@igea.com.ar">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="input-password" 
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                        placeholder="••••••••">
                </div>
                
                <div class="flex justify-end mt-2">
                    <button onclick="window.recuperarClaveFirebase()" class="text-xs text-blue-600 hover:underline">¿Olvidaste tu contraseña?</button>
                </div>

                <button onclick="window.iniciarSesionFirebase()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition shadow-md mt-4">
                    Ingresar a la Intranet
                </button>
            </div>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL (OCULTA HASTA QUE SE LOGUEAN) -->
    <div id="aplicacion-principal" class="hidden flex h-screen w-full relative z-10">
        
        <!-- Menú Lateral -->
        <aside class="w-64 bg-blue-900/95 backdrop-blur-md text-white flex flex-col shadow-xl border-r border-white/10">
            <div class="p-6">
                <h1 class="text-2xl font-bold tracking-wider">IGEA Adm</h1>
                <p class="text-sm text-blue-300 mt-1">Portal de Gestión</p>
            </div>
            <nav class="flex-1 px-4 space-y-2" id="menu-navegacion">
                <button id="btn-inicio" onclick="cambiarVista('inicio')" class="w-full flex items-center p-3 text-left bg-blue-800 rounded-lg transition shadow-inner">
                    <span>🏠 Inicio</span>
                </button>
                <button id="btn-dpp" onclick="cambiarVista('dpp')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                    <span>👥 DPP</span>
                </button>
                <button id="btn-procedimientos" onclick="cambiarVista('procedimientos')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                    <span>📋 Procedimientos</span>
                </button>
                <button id="btn-recibos" onclick="cambiarVista('recibos')" class="w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition">
                    <span>📄 Mis Recibos de Sueldo</span>
                </button>
            </nav>
            <div class="p-4 border-t border-blue-800/50">
                <p class="text-xs text-center text-blue-400">Versión 3.0 (Segura)</p>
            </div>
        </aside>

        <!-- Panel Central -->
        <main class="flex-1 flex flex-col h-screen overflow-y-auto no-scrollbar">
            <!-- Encabezado superior -->
            <header class="bg-white/80 backdrop-blur-sm shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center border-b border-gray-200/50">
                <div class="flex items-center gap-4">
                    <button id="btn-volver" onclick="volverAtras()" class="hidden text-blue-600 font-medium flex items-center transition bg-blue-50 px-3 py-1.5 rounded-md hover:bg-blue-100">
                        <span class="mr-1">←</span> Volver
                    </button>
                    <h2 id="titulo-seccion" class="text-xl font-semibold text-gray-800">Inicio</h2>
                </div>
                
                <!-- Info de usuario y Cerrar Sesión -->
                <div class="flex items-center gap-4">
                    <span id="nombre-usuario-header" class="text-sm text-gray-600 font-medium bg-gray-100 px-3 py-1 rounded-full">Cargando...</span>
                    <button onclick="window.cerrarSesion()" class="text-sm text-red-600 hover:text-red-800 font-medium transition">Cerrar Sesión</button>
                </div>
            </header>

            <div id="contenido-seccion" class="p-8 w-full max-w-5xl mx-auto h-full">
                <!-- Contenido dinámico -->
            </div>
        </main>
    </div>

    <!-- Lógica JavaScript -->

        // VARIABLE GLOBAL PARA SABER QUIÉN INGRESÓ

        // ==========================================
        // BASE DE DATOS DE RECIBOS (AHORA MAPEADOS POR MAIL)
        // ==========================================
        const baseRecibos = [
            { email: "damirodriguez81@gmail.com", nombre: "RODRIGUEZ Damián", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1rm4KzCg1kzz2331RipWsxF_VHW22RUxc#list" },
            { email: "antonela.db08@gmail.com", nombre: "BARCA Antonela", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1d_XCX3rW4K-TrOuFl6RphGW59GGS75rp#list" },
            { email: "ycavero@igea.com.ar", nombre: "CAVERO Yesica", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1QLA7FF4m321WpWAg5n2NGGrb4bnAOePr#list" },
            { email: "agustina.canclini@gmail.com", nombre: "CEPEDA CANCLINI Agustina", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=129eIyYKSF-oYcNHJGmMy5yBJkV5cHAjN#list" },
            { email: "violeclair@hotmail.com", nombre: "CLAIR Violeta", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1QYUmbR6ogwIVtBjpNvnogvIeI1i5STH_#list" },
            { email: "anahicontento@hotmail.com", nombre: "CONTENTO Anahí", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1LQtmaNxkYK8DEabnrSYYTZ1g5SQfCcnV#list" },
            { email: "coradeghini.sofia@gmail.com", nombre: "CORADEGHINI Sofía", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1JVg0maB0r6n71qoDEYa0BkC11EOtNkvZ#list" },
            { email: "genvisual@gmail.com", nombre: "GARCIA Nicolás", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=14gQgK-5yforXLuO9tPwB5ZCOPRskwOFx#list" },
            { email: "lolimic@hotmail.com", nombre: "MICCIULLO Dolores", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1JlMuDCQ8INZRwwBlKDQEruAjqogQKlMg#list" },
            { email: "florenciaolavarriabelen@gmail.com", nombre: "OLAVARRIA Florencia", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1VkoQqntqztQQzCGt75bOYV0TNdvI5di6#list" },
            { email: "silviapaez@hotmail.com", nombre: "PAEZ Silvia", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1jswBKEfen8deRq8ZNZx0wrn1V9Mp2CSa#list" },
            { email: "orirocio@gmail.com", nombre: "PEIÑEPIL Oriana", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1IiyO99e_8glZyzM8i5TSp2OFgxMDNpjS#list" },
            { email: "pezzellagiuliana@gmail.com", nombre: "PEZZELLA Giuliana", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1xOk46je2inGy2wMxlGBAZjFhti-UjdLz#list" },
            { email: "rmariapilar@hotmail.com", nombre: "RODRIGUEZ DE HOZ Pilar", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1AOhpojCPqqjqtl9FhRHivCu7I17VHf80#list" },
            { email: "brendaruiz026@gmail.com", nombre: "RUIZ Brenda", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1DF19U3pmCs9VLqd46iMeIq6502mNyzvY#list" },
            { email: "myriansantecchia@hotmail.com", nombre: "SANTECCHIA Myrian", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1BWyl3hQOXS4fJLEoLwV9m8nYiUgnfb6Z#list" },
            { email: "mvalero@igea.com.ar", nombre: "VALERO Manuel", urlCarpeta: "https://drive.google.com/embeddedfolderview?id=1DTnWeQVkxQ_mQ7EJEU0w4ygFnFlxjnO6#list" }
        ];

        // Archivos de Google Drive comunes
        const archivosDrive = {
            dpp: [
                { nombre: "Coordinador Operativo", area: "Administración y Finanzas", url: "https://docs.google.com/document/d/1IaOfr1qIjGI6kKGbioG84X5zZU9oOaoF/preview" }
            ],
            procedimientos: [
                { nombre: "Gestión de Vacaciones", fecha: "07/07/2026", url: "https://docs.google.com/document/d/1wYzmFrBZG0qQ3C9_HbHoHcUJDIwE-VcP/preview" }
            ]
        };

        let seccionActual = 'inicio';

        // FUNCIONES DE RENDERIZADO
        function renderizarInicio() {
            return `
                <div class="bg-white/90 p-8 rounded-2xl shadow-lg border border-white/50">
                    <h3 class="text-3xl font-bold text-blue-900 mb-4">Bienvenido al Portal de Administración</h3>
                    <p class="text-gray-600 mb-8 text-lg">Gestioná tus recursos de manera rápida y centralizada.</p>
                </div>
            `;
        }

        function renderizarRecibos() {
            // Buscamos en la lista el usuario que coincide con el mail que se logueó
            const empleado = baseRecibos.find(emp => emp.email.toLowerCase() === usuarioActualEmail.toLowerCase());

            if (empleado) {
                // Si lo encuentra, muestra directamente su carpeta
                return `
                    <div class="w-full h-[calc(100vh-12rem)] bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden relative">
                        <div id="spinner-carga" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-0">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                        <iframe src="${empleado.urlCarpeta}" class="w-full h-full relative z-10 border-0 bg-white"
                            onload="document.getElementById('spinner-carga').style.display='none'" allow="autoplay">
                        </iframe>
                    </div>
                `;
            } else {
                // Si no le pusiste la carpeta a su correo, muestra error
                return `
                    <div class="bg-red-50 p-6 rounded-xl border border-red-200 text-center">
                        <h3 class="text-xl font-bold text-red-700 mb-2">Legajo no encontrado</h3>
                        <p class="text-red-600">Tu correo (${usuarioActualEmail}) no tiene una carpeta de recibos asociada. Comunicáte con Administración.</p>
                    </div>
                `;
            }
        }

        function renderizarDPP() { return `<div class="bg-white p-6 rounded-xl shadow">Sección DPP en mantenimiento visual...</div>`; }
        function renderizarProcedimientos() { return `<div class="bg-white p-6 rounded-xl shadow">Sección Procedimientos...</div>`; }

        // CONTROLADORES DE INTERFAZ
        function actualizarMenuActivo(vista) {
            ['inicio', 'dpp', 'procedimientos', 'recibos'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if (btn) btn.className = "w-full flex items-center p-3 text-left hover:bg-blue-800 rounded-lg transition";
            });
            const btnActivo = document.getElementById(`btn-${vista}`);
            if (btnActivo) btnActivo.className = "w-full flex items-center p-3 text-left bg-blue-800 rounded-lg transition shadow-inner";
        }

        function cambiarVista(vista) {
            seccionActual = vista;
            actualizarMenuActivo(vista);
            document.getElementById('btn-volver').classList.add('hidden');
            const contenido = document.getElementById('contenido-seccion');
            const titulo = document.getElementById('titulo-seccion');

            if (vista === 'inicio') { titulo.textContent = "Inicio"; contenido.innerHTML = renderizarInicio(); }
            if (vista === 'dpp') { titulo.textContent = "Directorio DPP"; contenido.innerHTML = renderizarDPP(); }
            if (vista === 'procedimientos') { titulo.textContent = "Procedimientos"; contenido.innerHTML = renderizarProcedimientos(); }
            if (vista === 'recibos') { titulo.textContent = "Legajo Digital Privado"; contenido.innerHTML = renderizarRecibos(); }
        }

        function volverAtras() { cambiarVista(seccionActual); }
    </script>
    
    <!-- ========================================== -->
    <!-- CONFIGURACIÓN DEL CEREBRO DE FIREBASE      -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        // Importamos el vigilante: onAuthStateChanged y signOut
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg0u_Se2Od--7wbZFwqWKRdUv_IrYiXw0",
            authDomain: "intranet-igea.firebaseapp.com",
            projectId: "intranet-igea",
            storageBucket: "intranet-igea.appspot.com",
            messagingSenderId: "53285656859",
            appId: "1:53285656859:web:b98b85861bd5d0472e1bbe"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // EL VIGILANTE: Se ejecuta solo cada vez que alguien entra o sale
        onAuthStateChanged(auth, (user) => {
            const pantallaLogin = document.getElementById('pantalla-login');
            const appPrincipal = document.getElementById('aplicacion-principal');

            if (user) {
                // Hay sesión activa
                usuarioActualEmail = user.email;
                document.getElementById('nombre-usuario-header').textContent = user.email;
                
                pantallaLogin.classList.add('hidden'); // Ocultar Login
                appPrincipal.classList.remove('hidden'); // Mostrar Intranet
                cambiarVista('inicio'); // Cargar Inicio por defecto
            } else {
                // No hay sesión activa
                usuarioActualEmail = "";
                pantallaLogin.classList.remove('hidden'); // Mostrar Login
                appPrincipal.classList.add('hidden'); // Ocultar Intranet
            }
        });

        // Funciones conectadas a los botones del HTML
        window.iniciarSesionFirebase = function() {
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            if(!email || !password) { alert("Completá los datos."); return; }
            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => alert("Error: Verificá tus credenciales."));
        };

        window.recuperarClaveFirebase = function() {
            const email = document.getElementById('input-email').value;
            if(!email) { alert("Escribí tu correo primero y volvé a presionar acá."); return; }
            sendPasswordResetEmail(auth, email)
                .then(() => alert("Correo enviado a " + email))
                .catch((error) => alert("Error al enviar."));
        };

        window.cerrarSesion = function() {
            signOut(auth).then(() => {
                document.getElementById('input-password').value = ''; // Limpiamos el campo
            });
        };
    </script>
</body>

</html>
